# =============================================================================
# sessiond config.example.yaml — reference for all supported settings
# =============================================================================
#
# Drop this file into any gosdk config search path as config.yaml. Use
# config.local.yaml for machine-specific overrides.
#
# Layer order (low → high priority): defaults, config files, then explicit
# environment variables handled by the config getters. Gosdk does not install an
# env-key replacer, so APP_SESSIOND_* names are not automatic dotted-key mapping.
# SUPERSET_* names remain supported for backwards compatibility.

sessiond:
  summarizer:
    provider: auto
    model: gemma-4-26b-a4b-it
  agents:
    claude:
      transcripts_dir: ""
    codex:
      sessions_dir: ""

# Environment equivalents:
# APP_SESSIOND_SUMMARIZER_PROVIDER
# APP_SESSIOND_SUMMARIZER_MODEL
# APP_SESSIOND_AGENTS_CLAUDE_TRANSCRIPTS_DIR
# APP_SESSIOND_AGENTS_CODEX_SESSIONS_DIR
# Legacy: SUPERSET_SUMMARIZER, SUPERSET_SUMMARIZER_MODEL,
# SUPERSET_CODEX_SESSIONS_DIR

# auto uses Gemini when GOOGLE_API_KEY is set, otherwise heuristic.
# heuristic disables network calls; google fails if the key is missing.
